name: Build

on:
  push:
    branches: [ master, release/* ]
  pull_request:
    branches: [ master ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Install system dependencies (Ubuntu)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y librocksdb-dev libssl-dev pkg-config protobuf-compiler

    - name: Install system dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install rocksdb openssl protobuf

    - name: Install protoc (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        $protocVersion = "25.1"
        $protocUrl = "https://github.com/protocolbuffers/protobuf/releases/download/v$protocVersion/protoc-$protocVersion-win64.zip"
        $zipPath = "$env:RUNNER_TEMP\protoc.zip"
        $extractPath = "$env:RUNNER_TEMP\protoc"
        Write-Output "Downloading protoc from $protocUrl"
        Invoke-WebRequest -Uri $protocUrl -OutFile $zipPath
        Expand-Archive -Path $zipPath -DestinationPath $extractPath -Force
        echo "$extractPath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        Write-Output "PROTOC=$extractPath\bin\protoc.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        Write-Output "protoc installed successfully"

    - name: Install libclang (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        pip install libclang
        $libclangDll = Get-ChildItem -Path "$env:USERPROFILE\AppData\Roaming\Python\Python311\site-packages\clang\native" -Filter "libclang.dll" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
        if (-not $libclangDll) {
          $libclangDll = Get-ChildItem -Path "$env:RUNNER_TEMP" -Filter "libclang.dll" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        if (-not $libclangDll) {
          $libclangDll = Get-ChildItem -Path "$env:USERPROFILE\AppData\Local\pip" -Filter "libclang.dll" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
        }
        if ($libclangDll) {
          $libclangDir = $libclangDll.Directory.FullName
          Write-Output "LIBCLANG_PATH=$libclangDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Output "libclang found at: $libclangDir"
        } else {
          Write-Output "libclang.dll not found via search, will rely on PATH"
        }

    - name: Build release
      run: cargo build --release --verbose

    - name: Run tests
      run: cargo test --verbose

  build-python:
    name: Build Python Package
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        path: repo

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Clean pip cache completely
      run: |
        pip cache purge || true
        rm -rf ~/.cache/pip || true

    - name: Remove pyproject.toml to avoid maturin
      run: |
        rm -f repo/python/pyproject.toml

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools wheel numpy pandas pydantic requests aiohttp grpcio grpcio-tools protobuf

    - name: Generate protobuf Python code
      run: |
        cd repo
        python -m grpc_tools.protoc -I./src/coretex_grpc --python_out=./python --grpc_python_out=./python ./src/coretex_grpc/coretex.proto
        ls -la python/

    - name: Fix protobuf imports
      working-directory: repo/python
      run: |
        if [ -f coretexdb_pb2_grpc.py ]; then
          sed -i 's/^import coretexdb_pb2 from /from /g' coretexdb_pb2_grpc.py || true
          cat coretexdb_pb2.py | head -20
        else
          echo "Warning: coretexdb_pb2.py not found"
          ls -la
        fi

    - name: Build package with pip
      working-directory: repo/python
      run: |
        pip install -e .
        python -c "import coretexdb; print('Package installed successfully')"
